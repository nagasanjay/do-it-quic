services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8080"
    ports:
      - "8081:8081"
      - "8081:8081/udp" # WebTransport uses UDP
    # NET_ADMIN is required for tc (traffic control) netem commands
    cap_add:
      - NET_ADMIN
    environment:
      - QUIC_GO_LOG_LEVEL=info
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "3000"
    environment:
      - WATCHPACK_POLLING=true # Helps with hot-reloading on Windows/WSL
